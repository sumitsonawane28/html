<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Correct Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Responsive Layout</title>

    <style>
        .col-custom {
            background-color: #f2f2f2;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="mt-4 mb-4">Responsive Bootstrap Grid Layout</h1>

        <div class="row">

            <!-- Column 1 -->
            <div class="col-sm-6 col-md-4">
                <div class="col-custom">
                    <h3>Column 1</h3>
                    <p>
                        This column takes 6 units on tablets and 4 units on desktops.
                    </p>
                </div>
            </div>

            <!-- Column 2 -->
            <div class="col-sm-6 col-md-4">
                <div class="col-custom">
                    <h3>Column 2</h3>
                    <p>
                        This column shares a row with Column 1 on tablets.
                    </p>
                </div>
            </div>

            <!-- Column 3 -->
            <div class="col-sm-12 col-md-4">
                <div class="col-custom">
                    <h3>Column 3</h3>
                    <p>
                        This column becomes full width on small screens.
                    </p>
                </div>
            </div>

        </div>

    </div>

    <!-- Correct Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
