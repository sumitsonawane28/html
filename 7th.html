<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>jQuery Dynamic Page</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            margin: 20px 0;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            line-height: 100px;
            color: white;
            font-weight: bold;
        }

        #hover-box {
            background-color: #2ecc71;
        }

        .form-area {
            margin-top: 20px;
        }

        input[type="text"] {
            padding: 10px;
            width: 80%;
        }

        #feedback {
            margin-top: 10px;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }

        .highlight {
            background-color: yellow !important;
        }

        .animated {
            transition: transform 0.3s ease;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>jQuery Event & Animation Demo</h1>

        <h2>Click Action</h2>

        <div id="click-box" class="box">
            Click Me!
        </div>


        <h2>Hover Action</h2>

        <div id="hover-box" class="box">
            Hover Over Me!
        </div>


        <h2>Form Input Action</h2>

        <div class="form-area">

            <label for="input-field">
                Type something:
            </label>

            <br>

            <input type="text"
                id="input-field"
                placeholder="Start typing here...">

            <div id="feedback">
                Input reflects here...
            </div>

        </div>

    </div>


    <!-- Correct jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- External JS File -->
    <script src="Script.js"></script>

</body>

</html>
